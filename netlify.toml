# ═══════════════════════════════════════════════════════════
# ZapFlow — Netlify Configuration
# ═══════════════════════════════════════════════════════════
#
# ⚠️  ANTES DO DEPLOY, substitua <BACKEND_URL> pela URL real
#     do backend (ex: app-zapflow.up.railway.app).
#     Execute no terminal:
#       find . -name 'netlify.toml' -exec sed -i 's|<BACKEND_URL>|app-zapflow.up.railway.app|g' {} +
#     Ou edite manualmente as linhas de redirect abaixo.
#
#     Nem Netlify nem Vercel suportam variáveis de ambiente
#     nos campos "to"/"destination" de redirects.
#
# ═══════════════════════════════════════════════════════════

[build]
  command = "cd frontend && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://<BACKEND_URL>/api/:splat"
  status = 200

[[redirects]]
  from = "/socket.io/*"
  to = "https://<BACKEND_URL>/socket.io/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
