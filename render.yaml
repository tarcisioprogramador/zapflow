# ═══════════════════════════════════════════════
# ZapFlow Backend — Render Blueprint
# ═══════════════════════════════════════════════
# Deploy com 1 clique:
#   1. Acesse https://dashboard.render.com
#   2. Clique "New +" -> "Blueprint"
#   3. Conecte o repositório tarcisioprogramador/zapflow
#   4. Clique "Apply"
#
# IMPORTANTE: Depois do deploy, adicione a env var DATABASE_URL:
#   https://dashboard.render.com → zapflow-backend → Environment
#   DATABASE_URL = file:/data/zapflow.db
# ═══════════════════════════════════════════════

services:
  - type: web
    name: zapflow-backend
    runtime: node
    repo: https://github.com/tarcisioprogramador/zapflow
    branch: master
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npx tsx src/index.ts
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: APP_NAME
        value: ZapFlow
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://frontend-nu-sooty-330qu20cvq.vercel.app
      - key: BACKEND_URL
        value: "https://zapflow-backend.onrender.com"
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: DATABASE_URL
        sync: false
      - key: MP_ACCESS_TOKEN
        value: ""
      - key: MP_PUBLIC_KEY
        value: ""
